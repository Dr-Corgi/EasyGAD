# GAD Training Stage Configuration
# This stage performs student rollout + discriminator update + PPO update

trainer:
  training_stage: "gad"
  total_epochs: 10
  critic_warmup: 0

algorithm:
  adv_estimator: "grpo"
  use_kl_in_reward: false
  gamma: 1.0
  lam: 1.0
  norm_adv_by_std_in_grpo: true

actor_rollout_ref:
  actor:
    strategy: "fsdp"
    ppo_epochs: 1
    clip_ratio: 0.2
    entropy_coeff: 0.0
    policy_loss:
      loss_mode: "clip_cov"  # PPO loss for GAD
  rollout:
    n: 8
    temperature: 1.0

critic:
  ppo_epochs: 1
