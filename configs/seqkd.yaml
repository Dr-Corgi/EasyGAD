# SeqKD Stage Configuration
# This stage performs SFT on teacher responses using teacher forcing GRPO

trainer:
  training_stage: "seqkd"
  total_epochs: 1
  critic_warmup: 0  # No critic warmup needed for seqkd

algorithm:
  adv_estimator: "grpo"
  use_kl_in_reward: false
  gamma: 1.0
  lam: 1.0
  norm_adv_by_std_in_grpo: true

actor_rollout_ref:
  actor:
    strategy: "fsdp"
    ppo_epochs: 1
    policy_loss:
      loss_mode: "vanilla"  # SFT loss
  rollout:
    n: 8  # Number of responses per prompt for GRPO
    temperature: 1.0
