# Warmup Stage Configuration
# This stage performs student rollout + discriminator update + SFT on teacher responses

trainer:
  training_stage: "warmup"
  total_epochs: 1
  critic_warmup: 0

algorithm:
  adv_estimator: "grpo"
  use_kl_in_reward: false
  gamma: 1.0
  lam: 1.0
  norm_adv_by_std_in_grpo: true

actor_rollout_ref:
  actor:
    strategy: "fsdp"
    ppo_epochs: 1
    policy_loss:
      loss_mode: "vanilla"  # SFT loss for warmup
  rollout:
    n: 8
    temperature: 1.0

critic:
  ppo_epochs: 1
